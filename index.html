<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ブイ水温モニタ</title>

<style>
body{
    font-family:sans-serif;
    background:#eef7ff;
    text-align:center;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin:auto;
    max-width:350px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.value{
    font-size:2em;
    margin:15px 0;
}
</style>
</head>

<body>

<div class="card">
    <h1>🌊 ブイ観測</h1>

    <div class="value" id="water">🌡 水温 -- ℃</div>
    <div class="value" id="air">☀ 気温 -- ℃</div>
    <div class="value" id="battery">🔋 電圧 -- V</div>

    <p id="time">更新時刻 --</p>
</div>

<script>

const url = "data.txt";

<script>

async function loadData() {

    const res = await fetch("data.txt");
    const text = await res.text();

    // 行分割
    const lines = text
        .trim()
        .split(/\r?\n/);

    // 最後の有効行
    const latest = lines[lines.length - 1];

    console.log(latest);

    // CSV分割
    const cols = latest.split(",");

    console.log(cols);

    // 必要データ
    const utc = cols[1];
    const battery = cols[2];
    const air = cols[3];
    const water = cols[4];

    // JST変換
    const date = new Date(utc);

    // 表示
    document.getElementById("water").textContent =
        `🌡 水温 ${water} ℃`;

    document.getElementById("air").textContent =
        `☀ 気温 ${air} ℃`;

    document.getElementById("battery").textContent =
        `🔋 電圧 ${battery} V`;

    document.getElementById("time").textContent =
        `更新: ${date.toLocaleString("ja-JP")}`;
}

// 初回実行
loadData();

// 30分ごと更新
setInterval(loadData, 1800000);

</script>

// 初回
loadData();

// 30分ごと更新
setInterval(loadData, 1800000);

</script>

</body>
</html>
