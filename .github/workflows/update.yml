name: Update buoy data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch data
        run: |
          curl "https://api.buoy.jp/buoy/wagri-dev.php?BUOY=101a731" > data.txt

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data.txt

          git commit -m "update data" || echo "no changes"

          git push
